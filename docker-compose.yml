services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=bank
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 }).ok' | mongosh --quiet mongodb://127.0.0.1:27017/admin | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - mongodb_data:/data/db
    restart: always

  mongodb-rs-init:
    image: mongo:7
    container_name: mongodb-rs-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -lc
      - |
        echo "Waiting for MongoDB replica set init..."
        mongosh --quiet mongodb://mongodb:27017/admin --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (error) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongodb:27017" }]
            });
            print("Replica set initialized");
          }
        '

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-rs-init:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI:?}
      - NODE_ENV=${NODE_ENV:-development}
    restart: always

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_URL: ${SERVICE_URL_SERVER:?}/graphql
        VITE_GRAPHQL_WS_URL: ${VITE_GRAPHQL_WS_URL:?}
    depends_on:
      server:
        condition: service_started
    ports:
      - "4173:80"
    restart: always

volumes:
  mongodb_data:






















